<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Đăng ký khóa học | MOOCs</title>
    <style>
        body, html { margin: 0; padding: 0; height: 100%; overflow: hidden; background-color: #F8FAFC; font-family: 'Inter', sans-serif;}
        .loader-container {
            position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%);
            display: flex; flex-direction: column; align-items: center; gap: 16px; color: #475569;
        }
        .spinner {
            width: 40px; height: 40px; border: 4px solid #E2E8F0; border-top: 4px solid #2563EB;
            border-radius: 50%; animation: spin 1s linear infinite;
        }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        iframe {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%; border: none; z-index: 10;
        }
    </style>
</head>
<body>
    <div class="loader-container">
        <div class="spinner"></div>
        <div>Đang tải biểu mẫu...</div>
    </div>

    <iframe 
        id="gform" 
        src="https://forms.gle/xyvts89BMLyZsQYy9?embedded=true" 
        onload="handleFormLoad()">
    </iframe>

    <script>
        let loadCount = 0;
        function handleFormLoad() {
            loadCount++;
            // Lần 1: Load form. Lần 2: Người dùng vừa submit xong
            if (loadCount > 1) {
                // Tự động chuyển thẳng sang trang Cảm ơn
                window.location.href = "thank-you.html";
            }
        }
    </script>
    </body>
</html>
