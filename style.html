<style>
    .btn-primary {
    display: block;
    width: fit-content;   /* hoặc bỏ dòng này nếu không cần */
    margin: 20px auto;

    background: var(--primary);
    color: white;
    padding: 12px 30px;
    border-radius: 30px;
    text-decoration: none;
    font-weight: 600;
    font-size: 1.1rem;
    transition: var(--transition);
    box-shadow: 0 4px 10px rgba(26, 115, 232, 0.3);
    border: none;
    cursor: pointer;
}
        ..btn-primary:hover {
    background: var(--primary-hover);
    transform: translateY(-2px);
    box-shadow: 0 6px 15px rgba(26, 115, 232, 0.4);
}
